<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>

  <!-- Subtle glows -->
  <circle cx="300" cy="200" r="420" fill="url(#glowA)" opacity="0.18"/>
  <circle cx="900" cy="440" r="420" fill="url(#glowB)" opacity="0.22"/>

  <!-- Diagonal accent lines -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="520" x2="1200" y2="40"/>
    <line x1="0" y1="580" x2="1200" y2="100"/>
  </g>

  <!-- Header strip -->
  <text x="600" y="58" text-anchor="middle" font-family="-apple-system, Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#6b7280" letter-spacing="2">
    5 MODELS · 20 REAL CODING TASKS · BLINDLY GRADED · ON GITHUB
  </text>

  <!-- Divider -->
  <line x1="600" y1="85" x2="600" y2="540" stroke="#1e1e2e" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ============ LEFT COLUMN (Opus) ============ -->
  <g>
    <!-- Label -->
    <rect x="80" y="100" width="240" height="32" rx="16" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
    <text x="200" y="121" text-anchor="middle" font-family="-apple-system, Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ef4444">
      DEFAULT: CLAUDE OPUS 4
    </text>

    <!-- Score -->
    <text x="80" y="180" font-family="-apple-system, Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#6b7280" letter-spacing="1">
      AVG QUALITY SCORE
    </text>
    <text x="80" y="248" font-family="-apple-system, Inter, system-ui, sans-serif" font-size="72" font-weight="900" fill="#ffffff" letter-spacing="-2">
      24.8
    </text>
    <text x="272" y="248" font-family="-apple-system, Inter, system-ui, sans-serif" font-size="28" font-weight="600" fill="#6b7280">
      /30
    </text>

    <!-- Cost -->
    <text x="80" y="330" font-family="-apple-system, Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#6b7280" letter-spacing="1">
      COST (20 TASKS)
    </text>
    <text x="80" y="398" font-family="-apple-system, Inter, system-ui, sans-serif" font-size="60" font-weight="900" fill="#ef4444" letter-spacing="-2">
      $1.21
    </text>

    <!-- Wins -->
    <text x="80" y="452" font-family="-apple-system, Inter, system-ui, sans-serif" font-size="15" fill="#9ca3af">
      Won 6 of 20 prompts (30%)
    </text>

    <!-- Quality bar -->
    <rect x="80" y="490" width="440" height="10" rx="5" fill="#1e1e2e"/>
    <rect x="80" y="490" width="365" height="10" rx="5" fill="#ef4444"/>
  </g>

  <!-- ============ RIGHT COLUMN (Sonnet) ============ -->
  <g>
    <!-- Label -->
    <rect x="680" y="100" width="240" height="32" rx="16" fill="rgba(251,191,36,0.15)" stroke="rgba(251,191,36,0.3)" stroke-width="1"/>
    <text x="800" y="121" text-anchor="middle" font-family="-apple-system, Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#fbbf24">
      ROUTED: CLAUDE SONNET 4
    </text>

    <!-- Score -->
    <text x="680" y="180" font-family="-apple-system, Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#6b7280" letter-spacing="1">
      AVG QUALITY SCORE
    </text>
    <text x="680" y="248" font-family="-apple-system, Inter, system-ui, sans-serif" font-size="72" font-weight="900" fill="#ffffff" letter-spacing="-2">
      26.1
    </text>
    <text x="872" y="248" font-family="-apple-system, Inter, system-ui, sans-serif" font-size="28" font-weight="600" fill="#6b7280">
      /30
    </text>
    <text x="680" y="280" font-family="-apple-system, Inter, system-ui, sans-serif" font-size="14" fill="#10b981" font-weight="700">
      +1.3 higher than Opus
    </text>

    <!-- Cost -->
    <text x="680" y="330" font-family="-apple-system, Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#6b7280" letter-spacing="1">
      COST (SAME 20 TASKS)
    </text>
    <text x="680" y="398" font-family="-apple-system, Inter, system-ui, sans-serif" font-size="60" font-weight="900" fill="#fbbf24" letter-spacing="-2">
      $0.23
    </text>
    <text x="904" y="398" font-family="-apple-system, Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#10b981">
      5.2× cheaper
    </text>

    <!-- Wins -->
    <text x="680" y="452" font-family="-apple-system, Inter, system-ui, sans-serif" font-size="15" fill="#9ca3af">
      Won 7 of 20 prompts (35%)
    </text>

    <!-- Quality bar -->
    <rect x="680" y="490" width="440" height="10" rx="5" fill="#1e1e2e"/>
    <rect x="680" y="490" width="383" height="10" rx="5" fill="#fbbf24"/>
  </g>

  <!-- Bottom banner -->
  <text x="600" y="560" text-anchor="middle" font-family="-apple-system, Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#ffffff">
    Opus 4 scored LOWER than Sonnet 4 at 5.2× the cost.
  </text>
  <text x="600" y="590" text-anchor="middle" font-family="-apple-system, Inter, system-ui, sans-serif" font-size="14" fill="#9ca3af">
    inferlane.dev · 4-model benchmark · Haiku 4.5 tied Sonnet on wins · Free MIT plugin
  </text>

  <defs>
    <radialGradient id="glowA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
